name: docs

# Build the Sphinx documentation on every PR and on pushes to main.
# Read the Docs runs the canonical build from .readthedocs.yaml; this
# workflow is the fast feedback loop that keeps the docs source compiling
# even when nobody opens the RTD project.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "pyproject.toml"
      - ".readthedocs.yaml"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "src/**"
      - "pyproject.toml"
      - ".readthedocs.yaml"
      - ".github/workflows/docs.yml"
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: sphinx build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: pin python
        run: uv python install 3.12

      - name: install package + docs extras
        run: uv pip install --system -e '.[docs]'

      - name: sphinx-build (warnings are errors)
        run: sphinx-build -W --keep-going -b html docs docs/_build/html

      - name: linkcheck (advisory)
        run: sphinx-build -b linkcheck docs docs/_build/linkcheck
        continue-on-error: true

      - name: upload html artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html
          if-no-files-found: error
