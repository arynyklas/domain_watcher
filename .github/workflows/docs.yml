name: docs

# Build the Sphinx documentation on every PR and on pushes to main.
# Read the Docs runs the canonical build from .readthedocs.yaml; this
# workflow is the fast feedback loop that keeps the docs source compiling
# even when nobody opens the RTD project.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "pyproject.toml"
      - ".readthedocs.yaml"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "src/**"
      - "pyproject.toml"
      - ".readthedocs.yaml"
      - ".github/workflows/docs.yml"
  workflow_call:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: sphinx build
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
        with:
          enable-cache: true
          python-version: "3.12"

      - name: pin python
        run: uv python install 3.12

      - name: install package + docs extras
        run: uv sync --extra docs

      - name: sphinx-build (warnings are errors)
        run: uv run --no-sync sphinx-build -W --keep-going -b html docs docs/_build/html

      - name: linkcheck (advisory)
        run: uv run --no-sync sphinx-build -b linkcheck docs docs/_build/linkcheck
        continue-on-error: true

      - name: upload html artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: docs-html
          path: docs/_build/html
          if-no-files-found: error
