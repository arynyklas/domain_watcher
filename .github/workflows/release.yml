name: release

# Triggered on a v* tag. Runs the full CI gate, builds wheel + sdist,
# and publishes to PyPI via Trusted Publishing (no token in the repo).
# Container image is pushed to GHCR.

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  ci:
    name: full ci
    uses: ./.github/workflows/ci.yml

  build:
    name: build wheel + sdist
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: pin python
        run: uv python install 3.12

      - name: tag matches pyproject version
        id: meta
        run: |
          tag="${GITHUB_REF##*/}"
          tag_version="${tag#v}"
          pyproject_version=$(uv run python -c "import tomllib, pathlib; \
              print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$tag_version" != "$pyproject_version" ]; then
            echo "tag $tag does not match pyproject.toml version $pyproject_version" >&2
            exit 1
          fi
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"

      - name: build
        run: uv build

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/domain-watcher
    permissions:
      id-token: write     # required for Trusted Publishing
    steps:
      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: publish
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password:` field — Trusted Publishing handles auth.

  publish-ghcr:
    name: publish container image to GHCR
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      - name: build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
