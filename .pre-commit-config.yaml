# Pre-commit hooks for domain-watcher.
#
# Hook revisions are pinned. The `pre-commit-autoupdate` workflow opens a
# weekly PR via `pre-commit autoupdate` (Dependabot does not cover
# pre-commit; see .github/workflows/pre-commit-autoupdate.yml).
#
# Run locally:
#     uv run pre-commit run --all-files
# Install the git hook:
#     uv run pre-commit install

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.5.18
    hooks:
      - id: uv-lock
