name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

# Cancel in-flight PR builds when a new commit is pushed; never cancel
# pushes to main (those gate the release workflow on tag).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: lint + typecheck + tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # codecov tokenless upload via OIDC
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - name: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: pin python
        run: uv python install ${{ matrix.python-version }}

      - name: install
        run: make install

      - name: ci
        run: make ci

      - name: upload coverage to codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238  # v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          use_oidc: true

  compose-smoke:
    name: compose smoke
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: set up buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: build app image
        run: docker compose -f docker/compose.yml build app

      - name: validate example config inside container
        env:
          TG_BOT_TOKEN: x
          TG_OPS_CHAT: "1"
        run: |
          docker compose -f docker/compose.yml run --rm --no-deps \
            -e TG_BOT_TOKEN \
            -e TG_OPS_CHAT \
            app config validate /etc/domain-watcher/config.yaml

      - name: tear down
        if: always()
        run: docker compose -f docker/compose.yml down -v

  integration:
    name: integration
    runs-on: ubuntu-latest
    needs: check
    env:
      UV_PYTHON: "3.12"
    steps:
      - name: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
        with:
          enable-cache: true
          python-version: "3.12"

      - name: pin python
        run: uv python install 3.12

      - name: install
        run: make install

      - name: docker preflight
        # Fail fast if Docker is unreachable; integration tests MUST NOT skip silently.
        run: docker info >/dev/null

      - name: integration
        run: make test-integration
