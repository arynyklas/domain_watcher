# Read the Docs build configuration for domain-watcher.
# Reference: https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# The project is built with Sphinx + MyST against the same package metadata
# CI uses, so the version on docs.readthedocs.io tracks pyproject.toml exactly.

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    post_create_environment:
      # Use uv for installs — same toolchain as local + CI, deterministic with
      # the project lockfile and an order of magnitude faster than pip.
      - python -m pip install --upgrade uv
    post_install:
      # Install the package itself plus the docs extra. The package install
      # is required for sphinx.ext.autodoc / autosummary to import modules.
      - uv pip install --system --no-cache-dir -e '.[docs]'

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

formats:
  - htmlzip
  - pdf

# Note: Read the Docs auto-discovers READTHEDOCS_CANONICAL_URL inside the
# build env; docs/conf.py picks it up so html_baseurl is correct on every
# version (latest, stable, PR previews).
