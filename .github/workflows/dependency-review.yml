name: dependency-review

# Inspects dependency changes in PRs and fails the check on any
# vulnerability of severity >= high. Lighter than CodeQL: runs only on
# diffs to direct dependency manifests.

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: dep-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: dependency review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
